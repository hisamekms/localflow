[env]
_.path = ["./scripts/bin"]
_.file = ".env"

[tools]
rust = "latest"
gh = "latest"
"github:hisamekms/senko" = "0.21.0"

[tasks.build]
description = "Build senko binary"
run = "cargo build -q --bin senko"

[tasks.senko]
description = "Run senko CLI"
run = "senko"

[tasks.test]
description = "Run unit tests"
run = "cargo test"

[tasks.test-e2e]
description = "Run e2e tests"
run = "bash tests/e2e/run.sh"

[tasks.senko-dev]
description = "Run locally built senko binary"
depends = ["build"]
run = "./target/debug/senko"
