[env]
_.path = ["./scripts/bin"]
_.file = ".env"

[tools]
rust = "latest"
gh = "latest"
"github:hisamekms/senko" = "0.34.0"

[tasks.build]
description = "Build senko binary"
run = "cargo build -q --bin senko"

[tasks.test]
description = "Run unit tests"
run = "cargo test"

[tasks.build-pg]
description = "Build senko binary with postgres feature"
run = "cargo build -q --bin senko --example pg_test_server --features postgres"

[tasks."e2e:sqlite"]
description = "Run e2e tests with SQLite backend"
depends = ["build"]
run = "bash tests/e2e/run.sh"

[tasks."e2e:postgres"]
description = "Run e2e tests with PostgreSQL backend"
depends = ["build-pg"]
run = "bash tests/e2e/run.sh --backend=postgres"

[tasks.e2e]
description = "Run e2e tests with all backends"
depends = ["e2e:sqlite", "e2e:postgres"]

[tasks.dev]
description = "Run locally built senko binary"
depends = ["build"]
run = "./target/debug/senko"
