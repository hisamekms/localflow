# senko configuration
# Config layering (priority high -> low):
#   1. CLI flag (--config)
#   2. SENKO_CONFIG env var
#   3. Project config (.senko/config.toml)
#   4. User config (~/.config/senko/config.toml)

[project]
name = "senko"

[workflow.branch_merge.hooks.mise_check]
command = "mise check"
when = "pre"
mode = "sync"
on_failure = "abort"

